name: Android Build

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install GitVersion
        uses: gittools/actions/gitversion/setup@v4.5.0
        with:
          versionSpec: '6.7.x'

      - name: Determine Version
        id: version
        uses: gittools/actions/gitversion/execute@v4.5.0

      - name: Calculate version code
        id: version_code
        run: |
          VERSION_CODE=$(git rev-list HEAD --count)
          echo "version_code=$VERSION_CODE" >> "$GITHUB_OUTPUT"

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Prebuild Android
        working-directory: apps/mobile
        run: pnpm exec expo prebuild --platform android --no-install
        env:
          APP_ENV: production

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build Release APK
        working-directory: apps/mobile/android
        run: |
          ./gradlew assembleRelease \
            -PVERSION_NAME=${{ steps.version.outputs.semVer }} \
            -PVERSION_CODE=${{ steps.version_code.outputs.version_code }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: multica-${{ steps.version.outputs.semVer }}.apk
          path: apps/mobile/android/app/build/outputs/apk/release/*.apk
          if-no-files-found: error
